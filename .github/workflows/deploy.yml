name: Build and Deploy

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # This job only runs if SSH credentials are set in GitHub Repository Secrets
    if: ${{ always() }}
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          HAS_SSH_KEY: ${{ secrets.BEGET_SSH_KEY != '' }}
        with:
          host: ${{ secrets.BEGET_HOST }}
          username: ${{ secrets.BEGET_USERNAME }}
          key: ${{ secrets.BEGET_SSH_KEY }}
          port: ${{ secrets.BEGET_PORT || 22 }}
          script: |
            # If variables are not set, gracefully skip or explain
            if [ -z "${{ secrets.BEGET_HOST }}" ] || [ -z "${{ secrets.BEGET_SSH_KEY }}" ]; then
              echo "⚠️ SSH secrets are not set yet. Skipping automatic VPS deployment step."
              echo "Setup BEGET_HOST, BEGET_USERNAME, and BEGET_SSH_KEY in GitHub Repository Secrets to enable automatic deploy."
              exit 0
            fi
            
            # Go to the project directory on VPS
            cd ~/visitcards || mkdir -p ~/visitcards && cd ~/visitcards
            
            # Write/update the docker-compose.yml file on VPS
            cat << 'EOF' > docker-compose.yml
            services:
              magma-vizitki:
                image: ghcr.io/rude-y-knot/visitcards:latest
                container_name: magma_vizitki_app
                ports:
                  - "1488:80"
                restart: always
            EOF

            # Log in to GitHub Container Registry on VPS (requires a personal access token or we pull public image)
            # Since GHCR repositories can be set to public, login is only needed if private.
            # If private, we can use a GitHub token. For public, direct pull is allowed.
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin || true
            
            # Pull latest image and recreate containers
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Clean up old unused images to save disk space on VPS
            docker image prune -f
